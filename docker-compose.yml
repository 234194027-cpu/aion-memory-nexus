name: life-memory-system

services:
  postgres:
    image: ankane/pgvector@sha256:956744bd14e9cbdf639c61c2a2a7c7c2c48a9c8cdd42f7de4ac034f4e96b90f8
    container_name: life-memory-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-life_memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-life_memory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不暴露端口到宿主机，仅内部网络可访问
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U life_memory"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - life-memory-network

  redis:
    image: redis@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    container_name: life-memory-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    # 不暴露端口到宿主机
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - life-memory-network

  # V3 derived graph store.  It has no host port and is opt-in so the existing
  # production stack remains Graphiti-off until Shadow validation is complete.
  neo4j:
    # 5.26-community manifest list, pinned 2026-07-19.  Keeping the manifest
    # digest (rather than an amd64 child digest) preserves supported CPU
    # architectures while preventing an upstream tag change from altering a
    # deployment.
    image: neo4j@sha256:362542416de6c09a971484d1893878016cc3b5cdec166e54b1c824a220ecd6b9
    container_name: life-memory-neo4j
    profiles: ["graphiti"]
    environment:
      # Profile is off by default.  Deployment runbook requires replacing this
      # placeholder before `--profile graphiti` is ever started.
      NEO4J_AUTH: neo4j/${GRAPHITI_NEO4J_PASSWORD:-change-me-before-enabling-graphiti}
      # Used only by the in-container healthcheck; the value is never exposed
      # through the API or logs.
      GRAPHITI_NEO4J_PASSWORD: ${GRAPHITI_NEO4J_PASSWORD:-change-me-before-enabling-graphiti}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    expose:
      - "7474"
      - "7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p \"$$GRAPHITI_NEO4J_PASSWORD\" 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - life-memory-network

  # Named volumes are created as root by Docker when first attached.  This
  # one-shot root container also repairs older workspace volumes before the
  # non-root API process can read or append Agent workspace files.
  workspace-init:
    image: life-memory-system-api
    user: "0:0"
    command: >
      sh -c "mkdir -p /app/data/agent-workspaces &&
             chown -R appuser:appuser /app/data/agent-workspaces"
    volumes:
      - agent_workspace_data:/app/data/agent-workspaces
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: life-memory-api
    environment:
      ENVIRONMENT: production
      POSTGRES_URL: postgresql://${POSTGRES_USER:-life_memory}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-life_memory}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      SYSTEM_API_TOKEN: ${SYSTEM_API_TOKEN:?SYSTEM_API_TOKEN is required}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1}
      WECOM_BOT_ID: ${WECOM_BOT_ID:-}
      WECOM_BOT_SECRET: ${WECOM_BOT_SECRET:-}
      WECOM_DEFAULT_AGENT_ID: ${WECOM_DEFAULT_AGENT_ID:-}
      MEDIA_STORAGE_DIR: /app/data/media-artifacts
      AGENT_WORKSPACE_DIR: /app/data/agent-workspaces
      MEDIA_MAX_FILE_SIZE_BYTES: ${MEDIA_MAX_FILE_SIZE_BYTES:-26214400}
      MEDIA_ALLOWED_MIME_TYPES: ${MEDIA_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,text/plain,text/markdown,text/html,text/csv,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation,audio/mpeg,audio/wav,video/mp4}
      MEDIA_ENABLE_MARKITDOWN: ${MEDIA_ENABLE_MARKITDOWN:-false}
      MEDIA_ENABLE_RAPIDOCR: ${MEDIA_ENABLE_RAPIDOCR:-false}
      MEDIA_ENABLE_WHISPER: ${MEDIA_ENABLE_WHISPER:-false}
      MEDIA_ENABLE_FFMPEG: ${MEDIA_ENABLE_FFMPEG:-false}
      MEDIA_ENABLE_YTDLP: ${MEDIA_ENABLE_YTDLP:-false}
      MEDIA_MAX_TRANSCRIBE_SECONDS: ${MEDIA_MAX_TRANSCRIBE_SECONDS:-600}
      MEDIA_EXTRACTION_TIMEOUT_SECONDS: ${MEDIA_EXTRACTION_TIMEOUT_SECONDS:-120}
      MEDIA_EXTRACTION_CONCURRENCY: ${MEDIA_EXTRACTION_CONCURRENCY:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      OBSIDIAN_VAULT_PATH: /app/obsidian-vault
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
      BOOTSTRAP_DEFAULTS: ${BOOTSTRAP_DEFAULTS:-true}
      AUTO_PATCH_SCHEMA: "false"
      CREATE_SCHEMA_ON_STARTUP: "false"
      SOLO_MODE: ${SOLO_MODE:-false}
      PUBLIC_MCP_BOOTSTRAP_ENABLED: ${PUBLIC_MCP_BOOTSTRAP_ENABLED:-false}
      ALLOW_SOLO_PRODUCTION: ${ALLOW_SOLO_PRODUCTION:-false}
      ALLOW_DEV_AUTH_FALLBACK: "false"
      AGENT_RUNTIME_ENABLED: ${AGENT_RUNTIME_ENABLED:-true}
      CONVERSATIONAL_AGENT_ENABLED: ${CONVERSATIONAL_AGENT_ENABLED:-true}
      WORKING_AGENT_SHADOW_ENABLED: ${WORKING_AGENT_SHADOW_ENABLED:-false}
      WORKING_AGENT_ACTIVE_ENABLED: ${WORKING_AGENT_ACTIVE_ENABLED:-true}
      WORKING_AGENT_DAILY_MODEL_CALL_LIMIT: ${WORKING_AGENT_DAILY_MODEL_CALL_LIMIT:-96}
      WORKING_AGENT_DAILY_PRIORITY_RESERVE: ${WORKING_AGENT_DAILY_PRIORITY_RESERVE:-32}
      WORKING_AGENT_DAILY_MAINTENANCE_CALL_LIMIT: ${WORKING_AGENT_DAILY_MAINTENANCE_CALL_LIMIT:-8}
      WORKING_AGENT_SCAN_BATCH_SIZE: ${WORKING_AGENT_SCAN_BATCH_SIZE:-20}
      WORKING_AGENT_FAST_DRAIN_MAX_BATCHES: ${WORKING_AGENT_FAST_DRAIN_MAX_BATCHES:-512}
      WORKING_AGENT_BUDGET_TIMEZONE: ${WORKING_AGENT_BUDGET_TIMEZONE:-Asia/Shanghai}
      GRAPHITI_ENABLED: ${GRAPHITI_ENABLED:-false}
      GRAPHITI_SHADOW_MODE: ${GRAPHITI_SHADOW_MODE:-true}
      GRAPHITI_NEO4J_URI: ${GRAPHITI_NEO4J_URI:-bolt://neo4j:7687}
      GRAPHITI_NEO4J_USER: ${GRAPHITI_NEO4J_USER:-neo4j}
      GRAPHITI_NEO4J_PASSWORD: ${GRAPHITI_NEO4J_PASSWORD:-}
      GRAPHITI_NEO4J_DATABASE: ${GRAPHITI_NEO4J_DATABASE:-neo4j}
      GRAPHITI_LLM_API_KEY: ${GRAPHITI_LLM_API_KEY:-}
      GRAPHITI_LLM_BASE_URL: ${GRAPHITI_LLM_BASE_URL:-${DEEPSEEK_API_URL:-https://api.deepseek.com/v1}}
      GRAPHITI_LLM_MODEL: ${GRAPHITI_LLM_MODEL:-deepseek-chat}
      GRAPHITI_EMBEDDING_MODEL: ${GRAPHITI_EMBEDDING_MODEL:-}
      GRAPHITI_PROJECTION_CONCURRENCY: ${GRAPHITI_PROJECTION_CONCURRENCY:-1}
      GRAPHITI_BACKFILL_BATCH_SIZE_MAX: ${GRAPHITI_BACKFILL_BATCH_SIZE_MAX:-200}
      GRAPHITI_REQUIRE_SOLO_MODE: ${GRAPHITI_REQUIRE_SOLO_MODE:-true}
      GRAPHITI_ADMIN_USER_IDS: ${GRAPHITI_ADMIN_USER_IDS:-}
    # 不直接映射端口，通过 nginx 代理
    expose:
      - "8000"
    volumes:
      - media_artifacts_data:/app/data/media-artifacts
      - agent_workspace_data:/app/data/agent-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      workspace-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - life-memory-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: life-memory-worker
    environment:
      ENVIRONMENT: production
      POSTGRES_URL: postgresql://${POSTGRES_USER:-life_memory}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-life_memory}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      SYSTEM_API_TOKEN: ${SYSTEM_API_TOKEN:?SYSTEM_API_TOKEN is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1}
      WECOM_BOT_ID: ${WECOM_BOT_ID:-}
      WECOM_BOT_SECRET: ${WECOM_BOT_SECRET:-}
      WECOM_DEFAULT_AGENT_ID: ${WECOM_DEFAULT_AGENT_ID:-}
      MEDIA_STORAGE_DIR: /app/data/media-artifacts
      AGENT_WORKSPACE_DIR: /app/data/agent-workspaces
      MEDIA_MAX_FILE_SIZE_BYTES: ${MEDIA_MAX_FILE_SIZE_BYTES:-26214400}
      MEDIA_ALLOWED_MIME_TYPES: ${MEDIA_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,text/plain,text/markdown,text/html,text/csv,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation,audio/mpeg,audio/wav,video/mp4}
      MEDIA_ENABLE_MARKITDOWN: ${MEDIA_ENABLE_MARKITDOWN:-false}
      MEDIA_ENABLE_RAPIDOCR: ${MEDIA_ENABLE_RAPIDOCR:-false}
      MEDIA_ENABLE_WHISPER: ${MEDIA_ENABLE_WHISPER:-false}
      MEDIA_ENABLE_FFMPEG: ${MEDIA_ENABLE_FFMPEG:-false}
      MEDIA_ENABLE_YTDLP: ${MEDIA_ENABLE_YTDLP:-false}
      MEDIA_MAX_TRANSCRIBE_SECONDS: ${MEDIA_MAX_TRANSCRIBE_SECONDS:-600}
      MEDIA_EXTRACTION_TIMEOUT_SECONDS: ${MEDIA_EXTRACTION_TIMEOUT_SECONDS:-120}
      MEDIA_EXTRACTION_CONCURRENCY: ${MEDIA_EXTRACTION_CONCURRENCY:-1}
      ENABLE_SCHEDULER: "false"
      BOOTSTRAP_DEFAULTS: ${BOOTSTRAP_DEFAULTS:-true}
      AUTO_PATCH_SCHEMA: "false"
      CREATE_SCHEMA_ON_STARTUP: "false"
      SOLO_MODE: ${SOLO_MODE:-false}
      PUBLIC_MCP_BOOTSTRAP_ENABLED: ${PUBLIC_MCP_BOOTSTRAP_ENABLED:-false}
      ALLOW_SOLO_PRODUCTION: ${ALLOW_SOLO_PRODUCTION:-false}
      ALLOW_DEV_AUTH_FALLBACK: "false"
      AGENT_RUNTIME_ENABLED: ${AGENT_RUNTIME_ENABLED:-true}
      CONVERSATIONAL_AGENT_ENABLED: ${CONVERSATIONAL_AGENT_ENABLED:-true}
      WORKING_AGENT_SHADOW_ENABLED: ${WORKING_AGENT_SHADOW_ENABLED:-false}
      WORKING_AGENT_ACTIVE_ENABLED: ${WORKING_AGENT_ACTIVE_ENABLED:-true}
      WORKING_AGENT_DAILY_MODEL_CALL_LIMIT: ${WORKING_AGENT_DAILY_MODEL_CALL_LIMIT:-96}
      WORKING_AGENT_DAILY_PRIORITY_RESERVE: ${WORKING_AGENT_DAILY_PRIORITY_RESERVE:-32}
      WORKING_AGENT_DAILY_MAINTENANCE_CALL_LIMIT: ${WORKING_AGENT_DAILY_MAINTENANCE_CALL_LIMIT:-8}
      WORKING_AGENT_SCAN_BATCH_SIZE: ${WORKING_AGENT_SCAN_BATCH_SIZE:-20}
      WORKING_AGENT_FAST_DRAIN_MAX_BATCHES: ${WORKING_AGENT_FAST_DRAIN_MAX_BATCHES:-512}
      WORKING_AGENT_BUDGET_TIMEZONE: ${WORKING_AGENT_BUDGET_TIMEZONE:-Asia/Shanghai}
      GRAPHITI_ENABLED: ${GRAPHITI_ENABLED:-false}
      GRAPHITI_SHADOW_MODE: ${GRAPHITI_SHADOW_MODE:-true}
      GRAPHITI_NEO4J_URI: ${GRAPHITI_NEO4J_URI:-bolt://neo4j:7687}
      GRAPHITI_NEO4J_USER: ${GRAPHITI_NEO4J_USER:-neo4j}
      GRAPHITI_NEO4J_PASSWORD: ${GRAPHITI_NEO4J_PASSWORD:-}
      GRAPHITI_NEO4J_DATABASE: ${GRAPHITI_NEO4J_DATABASE:-neo4j}
      GRAPHITI_LLM_API_KEY: ${GRAPHITI_LLM_API_KEY:-}
      GRAPHITI_LLM_BASE_URL: ${GRAPHITI_LLM_BASE_URL:-${DEEPSEEK_API_URL:-https://api.deepseek.com/v1}}
      GRAPHITI_LLM_MODEL: ${GRAPHITI_LLM_MODEL:-deepseek-chat}
      GRAPHITI_EMBEDDING_MODEL: ${GRAPHITI_EMBEDDING_MODEL:-}
      GRAPHITI_PROJECTION_CONCURRENCY: ${GRAPHITI_PROJECTION_CONCURRENCY:-1}
      GRAPHITI_BACKFILL_BATCH_SIZE_MAX: ${GRAPHITI_BACKFILL_BATCH_SIZE_MAX:-200}
      GRAPHITI_REQUIRE_SOLO_MODE: ${GRAPHITI_REQUIRE_SOLO_MODE:-true}
    command: >
      sh -c "alembic upgrade head &&
             python -m celery -A src.shared.db.worker worker --loglevel=info"
    volumes:
      - media_artifacts_data:/app/data/media-artifacts
      - agent_workspace_data:/app/data/agent-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.shared.db.worker inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - life-memory-network

  nginx:
    image: nginx@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    container_name: life-memory-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - life-memory-network

volumes:
  postgres_data:
  redis_data:
  media_artifacts_data:
  agent_workspace_data:
  neo4j_data:

networks:
  life-memory-network:
    driver: bridge
