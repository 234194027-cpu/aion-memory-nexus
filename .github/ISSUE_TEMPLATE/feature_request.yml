name: Feature request
description: Propose a scoped improvement to the public project.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior and boundaries
      description: Describe expected behavior, permissions, and evidence requirements. Do not include production data or credentials.
    validations:
      required: true
